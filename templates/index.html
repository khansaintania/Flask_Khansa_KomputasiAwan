<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            color: #333;
        }
        h2 {
            margin-bottom: 20px;
        }
        .result-box {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .full-width {
            grid-column: span 2;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .submit-btn {
            grid-column: span 2;
            text-align: right;
            margin-top: 10px;
        }
        button {
            padding: 8px 24px;
            background-color: #f8f9fa;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #e2e6ea;
        }
    </style>
</head>
<body>

    <h2>Diabetes Prediction</h2>

    {% if prediction %}
    <div class="result-box">
        Hasil prediksi: {{ prediction }}
    </div>
    {% endif %}

    <form action="/predict" method="POST">
        <div class="form-grid">
            
            <div class="full-width">
                <label>Model</label>
                <select name="model">
                    <option value="Decision Tree">Decision Tree</option>
                </select>
            </div>

            <div>
                <label>Pregnancies</label>
                <input type="number" step="any" name="pregnancies" required>
            </div>
            <div>
                <label>Glucose</label>
                <input type="number" step="any" name="glucose" required>
            </div>

            <div>
                <label>BloodPressure</label>
                <input type="number" step="any" name="blood_pressure" required>
            </div>
            <div>
                <label>SkinThickness</label>
                <input type="number" step="any" name="skin_thickness" required>
            </div>

            <div>
                <label>Insulin</label>
                <input type="number" step="any" name="insulin" required>
            </div>
            <div>
                <label>BMI</label>
                <input type="number" step="any" name="bmi" required>
            </div>

            <div>
                <label>DiabetesPedigreeFunction</label>
                <input type="number" step="any" name="dpf" required>
            </div>
            <div>
                <label>Age</label>
                <input type="number" step="any" name="age" required>
            </div>

            <div class="submit-btn">
                <button type="submit">Predict</button>
            </div>
            
        </div>
    </form>

</body>
</html>
